syntax = "proto3";

package aether.v1;

import "aether/v1/aether.proto";
import "aether/v1/events.proto";

option go_package = "github.com/SamarthParnami/aether/go/gen/aether/v1;aetherv1";

// Aether owner RPC — the INTERNAL gateway -> room-owner service (see 05-design-gateway.md).
//
// This is distinct from the client-facing WebSocket envelope in aether.proto: gateways terminate
// the client WS and forward to the room's current owner (resolved via the coord directory) over
// this RPC. Both sides are Go, so only the Connect-Go stubs are generated (no TS). It reuses the
// envelope's Event / Nack / EventBody / EphemeralBody / RoomState messages.

// RoomService is served by every owner node, wrapping its roomruntime.Runtime.
service RoomService {
  // Commit forwards a durable commit to the owner. Maps to Runtime.Commit.
  //
  // The committed Event is ALSO delivered to the originating client via its Subscribe stream
  // (fan-out is the ack); this unary response only tells the gateway persisted-vs-rejected.
  // A transport-level "I am not the owner" (Runtime.ErrNotOwner) is signalled as a Connect
  // FAILED_PRECONDITION error so the gateway re-resolves the owner and retries — it is not an
  // outcome on the wire here.
  rpc Commit(CommitRequest) returns (CommitResponse);

  // GetSnapshot returns the room's current materialized state for a fresh (or deep-resume) join.
  rpc GetSnapshot(GetSnapshotRequest) returns (GetSnapshotResponse);

  // Subscribe streams every committed Event with room_seq > from_seq, in strict room_seq order,
  // gap-free: the owner replays history from the log then continues live (repairing fan-out
  // reordering from the log). It serves both the live tail and resume catch-up.
  //
  // If from_seq is below the log floor (after snapshots/compaction land — not yet), the owner
  // fails the stream with a Connect OUT_OF_RANGE error ("from_seq too old"); the gateway then
  // falls back to GetSnapshot + Subscribe(snapshotSeq) — the deep-resume path.
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);

  // Broadcast fans an ephemeral (lossy, unordered, no-ack) message to room subscribers.
  rpc Broadcast(BroadcastRequest) returns (BroadcastResponse);
}

message CommitRequest {
  string room_id = 1;
  string client_id = 2; // dedup key together with client_seq
  uint64 client_seq = 3; // per-client monotonic
  EventBody body = 4;
}

// CommitResponse reports the durable outcome of a commit — mirroring Runtime.Commit's THREE
// results: applied, rejected, or an exactly-once duplicate.
message CommitResponse {
  oneof outcome {
    Event committed = 1; // newly persisted (also fanned back to the client)
    Nack nack = 2; // application-level rejection (permission / invalid / rate-limited / ...)
    DuplicateAck duplicate = 3; // (client_id, client_seq) already applied — dedup no-op
  }
}

// DuplicateAck confirms a commit whose (client_id, client_seq) was already applied — the
// exactly-once path a lost-ack resubmit hits (owner persisted, then died before the gateway saw
// the response; the SDK resubmits). The owner does NOT re-fan the original Event, so the gateway
// uses this to complete the client's in-flight commit; the Event itself reaches the client via its
// Subscribe replay. Empty for now — may carry the original room_seq later if cheap to surface.
message DuplicateAck {}

message GetSnapshotRequest {
  string room_id = 1;
}

message GetSnapshotResponse {
  uint64 room_seq = 1; // state is materialized up to here
  RoomState state = 2;
}

message SubscribeRequest {
  string room_id = 1;
  uint64 from_seq = 2; // stream events with room_seq > from_seq
}

// SubscribeResponse wraps a single streamed Event (named per the RPC for buf lint).
message SubscribeResponse {
  Event event = 1;
}

message BroadcastRequest {
  string room_id = 1;
  string origin_client_id = 2;
  EphemeralBody body = 3;
}

message BroadcastResponse {}
