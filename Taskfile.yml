# Unified entrypoint for the polyglot monorepo (Go + TS + Protobuf).
# Install Task: https://taskfile.dev/installation/
version: '3'

tasks:
  default:
    cmds:
      - task --list
    silent: true

  build:
    desc: Build everything (Go now; TS/proto wired as those PRs land)
    cmds:
      - task: go:build

  test:
    desc: Test everything
    cmds:
      - task: go:test

  lint:
    desc: Lint everything (Go now; eslint wired in PR-03)
    cmds:
      - task: go:lint

  fmt:
    desc: Format all Go code (gofumpt + goimports)
    cmds:
      - task: go:fmt

  # --- Go ---
  go:build:
    dir: go
    cmds:
      - go build ./...

  go:test:
    dir: go
    cmds:
      - go test -race ./...

  go:vet:
    dir: go
    cmds:
      - go vet ./...

  go:lint:
    desc: "Run golangci-lint (install: https://golangci-lint.run/welcome/install/)"
    dir: go
    cmds:
      - golangci-lint run

  go:fmt:
    dir: go
    cmds:
      - golangci-lint fmt

  go:fmt:check:
    desc: Fail if Go code is not formatted (CI)
    dir: go
    cmds:
      - golangci-lint fmt --diff

  # --- Wired in later PRs ---
  # proto:gen   -> buf generate           (PR-04 / PR-06)
  # ts:build    -> yarn turbo run build   (PR-03)
  # ts:test     -> yarn turbo run test    (PR-03)
