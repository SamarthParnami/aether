# golangci-lint v2 config. Install: https://golangci-lint.run/welcome/install/
# Run:  golangci-lint run        (lint)
#       golangci-lint fmt        (apply formatters)
version: "2"

run:
  timeout: 5m

linters:
  default: standard # errcheck, govet, ineffassign, staticcheck, unused
  enable:
    - bodyclose # HTTP/response bodies are closed
    - errorlint # correct error wrapping and comparisons (Go 1.13+)
    - gocritic # opinionated correctness/style checks
    - misspell # common misspellings in comments/strings
    - revive # fast, configurable golint successor
    - unconvert # redundant type conversions
    - unparam # unused function parameters/results
  exclusions:
    generated: lax
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unparam

formatters:
  enable:
    - gofumpt # stricter gofmt
    - goimports # import grouping/ordering
  settings:
    goimports:
      local-prefixes:
        - github.com/SamarthParnami/aether
